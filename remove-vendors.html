<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Remove 3 Vendors</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232E7D32' width='100' height='100' rx='20'/><text x='50' y='70' font-size='60' text-anchor='middle' dominant-baseline='middle'>🛍️</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ef5350 0%, #c62828 100%);
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }
    h1 { color: #1f2937; margin-bottom: 10px; font-size: 24px; }
    .warning {
      background: #fff3cd;
      border-left: 4px solid #ff9800;
      padding: 12px;
      border-radius: 4px;
      color: #856404;
      font-size: 13px;
      margin: 15px 0;
      text-align: left;
    }
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #ef5350;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px 0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status { color: #6b7280; font-size: 16px; margin: 20px 0; }
    .success { color: #2e7d32; font-weight: 600; }
    .error { color: #ef5350; font-weight: 600; }
    .vendors-list {
      text-align: left;
      margin-top: 20px;
      background: #f9fafb;
      padding: 15px;
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
    }
    .vendor-item {
      padding: 10px;
      margin: 6px 0;
      background: white;
      border-left: 3px solid #ef5350;
      border-radius: 4px;
      font-size: 13px;
    }
    .vendor-name { font-weight: 600; color: #1f2937; }
    .vendor-products { color: #9ca3af; font-size: 12px; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗑️ Removing Vendors</h1>
    <div class="warning">⚠️ This will delete 3 vendors and all their products from Firestore</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Deleting vendors and products...</div>
    <div class="vendors-list" id="vendors"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2vGB7iehqse--Th5wds1MoU4ZHr_DYY4",
      authDomain: "mukoto-avenue-3758a.firebaseapp.com",
      projectId: "mukoto-avenue-3758a",
      storageBucket: "mukoto-avenue-3758a.firebasestorage.app",
      messagingSenderId: "172793539743",
      appId: "1:172793539743:web:46fae0bd5be1ecedebc6aa",
      measurementId: "G-VN9T6FEVJ0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        await signInAnonymously(auth);
      }
    });

    const vendorNames = ["Fresh Produce Co.", "Premium Fashions", "Electronics Plus"];
    const vendorsList = document.getElementById('vendors');
    const statusEl = document.getElementById('status');
    const spinner = document.getElementById('spinner');

    setTimeout(async () => {
      try {
        let totalDeleted = 0;
        let totalProducts = 0;

        for (const vendorName of vendorNames) {
          // Find vendor
          const vendorQuery = query(collection(db, 'vendors'), where('shopName', '==', vendorName));
          const vendorSnap = await getDocs(vendorQuery);

          if (vendorSnap.empty) {
            vendorsList.innerHTML += `<div class="vendor-item" style="border-left-color: #9ca3af;"><div class="vendor-name">⊘ ${vendorName} not found</div></div>`;
            continue;
          }

          const vendorDoc = vendorSnap.docs[0];
          const vendorId = vendorDoc.id;

          // Delete all products for this vendor
          const productsQuery = query(collection(db, 'products'), where('vendorId', '==', vendorId));
          const productsSnap = await getDocs(productsQuery);
          
          let productCount = 0;
          for (const productDoc of productsSnap.docs) {
            await deleteDoc(productDoc.ref);
            productCount++;
            totalProducts++;
          }

          // Delete vendor
          await deleteDoc(vendorDoc.ref);
          totalDeleted++;

          vendorsList.innerHTML += `<div class="vendor-item"><div class="vendor-name">✓ ${vendorName}</div><div class="vendor-products">${productCount} products removed</div></div>`;
        }

        spinner.style.display = 'none';
        statusEl.className = 'status success';
        statusEl.textContent = `✅ Deleted ${totalDeleted} vendors and ${totalProducts} products!`;
        setTimeout(() => window.location.href = 'customer-home.html', 2000);
      } catch (err) {
        spinner.style.display = 'none';
        statusEl.className = 'status error';
        statusEl.textContent = `❌ Error: ${err.message}`;
        console.error(err);
      }
    }, 800);
  </script>
</body>
</html>
