<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mukoto Avenue — Cart</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232E7D32' width='100' height='100' rx='20'/><text x='50' y='70' font-size='60' text-anchor='middle' dominant-baseline='middle'>🛍️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #FAFAFA;
      font-family: 'Inter', sans-serif;
      padding-bottom: 120px;
    }

    /* ── Header ── */
    .header {
      background: white;
      padding: 52px 20px 16px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .header-row {
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .back-btn {
      width: 40px; height: 40px;
      background: #F3F4F6; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; border: none;
      text-decoration: none; transition: all 0.2s;
    }
    .back-btn:hover { background: #E5E7EB; }
    .header-title {
      font-family: 'Poppins', sans-serif;
      font-size: 18px; font-weight: 800; color: #1A1A1A;
    }
    .clear-btn {
      font-size: 13px; font-weight: 600; color: #EF5350;
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; border-radius: 8px;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: #fef2f2; }

    /* ── Cart items ── */
    .cart-list {
      padding: 16px 16px 0;
      display: flex; flex-direction: column; gap: 12px;
    }

    .cart-item {
      background: white; border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      display: flex; gap: 14px;
      position: relative;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-img {
      width: 80px; height: 80px; border-radius: 12px;
      background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; flex-shrink: 0; overflow: hidden;
      position: relative;
    }
    .item-img img {
      width: 100%; height: 100%;
      object-fit: cover; position: absolute; inset: 0;
    }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 700; color: #1A1A1A;
      margin-bottom: 2px;
      display: -webkit-box; -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .item-vendor { font-size: 11px; color: #9CA3AF; margin-bottom: 8px; }
    .item-condition {
      display: inline-block;
      padding: 2px 8px; border-radius: 999px;
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .item-condition.new { background: #e8f5e9; color: #2E7D32; }
    .item-condition.used { background: #fff3e0; color: #E65100; }

    .item-bottom {
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .item-price {
      font-family: 'Poppins', sans-serif;
      font-size: 16px; font-weight: 800; color: #2E7D32;
    }
    .item-price-zwg {
      font-size: 10px; color: #9CA3AF;
    }

    /* Qty control */
    .qty-control {
      display: flex; align-items: center; gap: 0;
      border: 1.5px solid #E5E7EB; border-radius: 10px;
      overflow: hidden;
    }
    .qty-btn {
      width: 32px; height: 32px;
      background: #F9FAFB; border: none;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #374151; transition: background 0.2s;
    }
    .qty-btn:hover { background: #E5E7EB; }
    .qty-val {
      width: 36px; text-align: center;
      font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 700; color: #1A1A1A;
      border-left: 1px solid #E5E7EB;
      border-right: 1px solid #E5E7EB;
      line-height: 32px;
    }

    /* Remove button */
    .remove-btn {
      position: absolute; top: 12px; right: 12px;
      width: 24px; height: 24px;
      background: #F3F4F6; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; cursor: pointer; border: none;
      color: #9CA3AF; transition: all 0.2s;
    }
    .remove-btn:hover { background: #fef2f2; color: #EF5350; }

    /* ── Vendor grouping label ── */
    .vendor-group-label {
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px; margin-top: 16px; margin-bottom: 4px;
    }
    .vendor-group-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2E7D32;
    }
    .vendor-group-name {
      font-size: 12px; font-weight: 700; color: #6B7280;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ── Order notes ── */
    .notes-section {
      margin: 16px 16px 0;
      background: white; border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .notes-label {
      font-size: 13px; font-weight: 700; color: #374151;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .notes-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E5E7EB; border-radius: 12px;
      font-size: 13px; color: #1A1A1A;
      font-family: 'Inter', sans-serif;
      resize: none; outline: none;
      transition: border-color 0.2s;
      background: #F9FAFB;
      min-height: 80px;
    }
    .notes-input:focus { border-color: #2E7D32; background: white; }
    .notes-input::placeholder { color: #9CA3AF; }

    /* ── Promo code ── */
    .promo-section {
      margin: 12px 16px 0;
      background: white; border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      display: flex; gap: 10px;
    }
    .promo-input {
      flex: 1; padding: 11px 14px;
      border: 1.5px solid #E5E7EB; border-radius: 10px;
      font-size: 13px; color: #1A1A1A;
      font-family: 'Inter', sans-serif;
      outline: none; background: #F9FAFB;
      transition: border-color 0.2s;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .promo-input:focus { border-color: #2E7D32; background: white; }
    .promo-input::placeholder { text-transform: none; letter-spacing: 0; color: #9CA3AF; }
    .promo-btn {
      padding: 11px 16px; border-radius: 10px;
      border: none; background: #2E7D32; color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .promo-btn:hover { background: #1B5E20; }

    /* ── Order summary ── */
    .summary-section {
      margin: 12px 16px 0;
      background: white; border-radius: 16px;
      padding: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .summary-title {
      font-family: 'Poppins', sans-serif;
      font-size: 15px; font-weight: 800; color: #1A1A1A;
      margin-bottom: 14px;
    }
    .summary-row {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
      font-size: 14px;
    }
    .summary-row-label { color: #6B7280; }
    .summary-row-val { font-weight: 600; color: #1A1A1A; }
    .summary-row-val.green { color: #2E7D32; }
    .summary-row-val.red { color: #EF5350; }
    .summary-divider { height: 1px; background: #F3F4F6; margin: 12px 0; }
    .summary-total {
      display: flex; justify-content: space-between;
      align-items: center;
    }
    .summary-total-label {
      font-family: 'Poppins', sans-serif;
      font-size: 16px; font-weight: 800; color: #1A1A1A;
    }
    .summary-total-val {
      font-family: 'Poppins', sans-serif;
      font-size: 22px; font-weight: 800; color: #2E7D32;
    }
    .summary-total-zwg {
      font-size: 11px; color: #9CA3AF;
      text-align: right; margin-top: 2px;
    }

    /* ── Empty cart ── */
    .empty-cart {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 32px; text-align: center;
    }
    .empty-cart.show { display: flex; }
    .empty-emoji { font-size: 64px; margin-bottom: 16px; }
    .empty-title {
      font-family: 'Poppins', sans-serif;
      font-size: 20px; font-weight: 800;
      color: #1A1A1A; margin-bottom: 8px;
    }
    .empty-desc { font-size: 14px; color: #9CA3AF; margin-bottom: 24px; line-height: 1.6; }
    .btn-shop {
      padding: 14px 28px; border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #2E7D32, #1B5E20);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 4px 16px rgba(46,125,50,0.3);
    }

    /* ── Bottom CTA ── */
    .cta-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      padding: 14px 16px 32px;
      border-top: 1px solid #F3F4F6;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    .btn-checkout {
      width: 100%; padding: 16px;
      border-radius: 14px; border: none;
      background: linear-gradient(135deg, #2E7D32, #1B5E20);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(46,125,50,0.35);
      display: flex; align-items: center;
      justify-content: center; gap: 10px;
    }
    .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(46,125,50,0.45); }
    .btn-checkout:active { transform: translateY(0); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 110px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 20px; border-radius: 12px;
      font-size: 13px; font-weight: 600; color: white;
      opacity: 0; transition: all 0.3s; z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      max-width: 90vw; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #2E7D32; }
    .toast.error { background: #EF5350; }
    .toast.info { background: #1565C0; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <a href="javascript:history.back()" class="back-btn">←</a>
      <div class="header-title">My Cart <span id="cartCount" style="color:#9CA3AF;font-size:14px;font-weight:600;"></span></div>
      <button class="clear-btn" onclick="clearCart()">Clear all</button>
    </div>
  </div>

  <!-- Cart items -->
  <div id="cartContent">
    <div class="cart-list" id="cartList"></div>

    <!-- Order notes -->
    <div class="notes-section">
      <div class="notes-label">📝 Order Notes <span style="color:#9CA3AF;font-weight:500;">(optional)</span></div>
      <textarea class="notes-input" id="orderNotes"
        placeholder="Any special instructions for your vendor? E.g. size preferences, pickup time..."
        maxlength="300"></textarea>
    </div>

    <!-- Promo code -->
    <div class="promo-section">
      <input class="promo-input" id="promoInput" type="text" placeholder="Promo code"/>
      <button class="promo-btn" onclick="applyPromo()">Apply</button>
    </div>

    <!-- Order summary -->
    <div class="summary-section">
      <div class="summary-title">Order Summary</div>
      <div class="summary-row">
        <div class="summary-row-label">Subtotal (<span id="itemCount">0</span> items)</div>
        <div class="summary-row-val" id="subtotal">$0.00</div>
      </div>
      <div class="summary-row">
        <div class="summary-row-label">Service Fee</div>
        <div class="summary-row-val">$0.50</div>
      </div>
      <div class="summary-row" id="discountRow" style="display:none;">
        <div class="summary-row-label">Discount</div>
        <div class="summary-row-val green" id="discountVal">-$0.00</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-total">
        <div class="summary-total-label">Total</div>
        <div>
          <div class="summary-total-val" id="totalUsd">$0.00</div>
          <div class="summary-total-zwg" id="totalZwg">ZWG 0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty cart -->
  <div class="empty-cart" id="emptyCart">
    <div class="empty-emoji">🛒</div>
    <div class="empty-title">Your cart is empty</div>
    <div class="empty-desc">Looks like you haven't added anything yet. Browse vendors and find something you love.</div>
    <a href="customer-home.html" class="btn-shop">Browse Products →</a>
  </div>

  <!-- CTA bar -->
  <div class="cta-bar" id="ctaBar">
    <button class="btn-checkout" onclick="goToCheckout()">
      Proceed to Checkout →
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase Auth guard only -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2vGB7iehqse--Th5wds1MoU4ZHr_DYY4",
      authDomain: "mukoto-avenue-3758a.firebaseapp.com",
      projectId: "mukoto-avenue-3758a",
      storageBucket: "mukoto-avenue-3758a.firebasestorage.app",
      messagingSenderId: "172793539743",
      appId: "1:172793539743:web:46fae0bd5be1ecedebc6aa",
      measurementId: "G-VN9T6FEVJ0"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => {
      if (!user) { window.location.href = 'login.html'; return; }
      renderCart();
    });
  </script>

  <script>
    const SERVICE_FEE = 0.50;
    const ZWG_RATE    = 36;
    let cart          = [];
    let discount      = 0;
    const PROMO_CODES = { 'MUKOTO10': 0.10, 'HARARE5': 0.05, 'VENDOR20': 0.20 };

    // ── Render cart ──────────────────────────────────────────────
    function renderCart() {
      cart = JSON.parse(localStorage.getItem('ma_cart') || '[]');

      if (!cart.length) {
        document.getElementById('cartContent').style.display = 'none';
        document.getElementById('emptyCart').classList.add('show');
        document.getElementById('ctaBar').style.display = 'none';
        document.getElementById('cartCount').textContent = '';
        return;
      }

      document.getElementById('cartContent').style.display = 'block';
      document.getElementById('emptyCart').classList.remove('show');
      document.getElementById('ctaBar').style.display = 'block';
      document.getElementById('cartCount').textContent = `(${cart.length})`;

      // Group by vendor
      const groups = {};
      cart.forEach(item => {
        const vName = item.vendorName || 'Unknown Vendor';
        if (!groups[vName]) groups[vName] = [];
        groups[vName].push(item);
      });

      const list = document.getElementById('cartList');
      list.innerHTML = '';

      Object.entries(groups).forEach(([vendorName, items]) => {
        // Vendor label
        const label = document.createElement('div');
        label.className = 'vendor-group-label';
        label.innerHTML = `
          <div class="vendor-group-dot"></div>
          <div class="vendor-group-name">🏪 ${vendorName}</div>`;
        list.appendChild(label);

        items.forEach(item => {
          const el = document.createElement('div');
          el.className = 'cart-item';
          el.id = `item-${item.id}`;
          const emoji = catEmoji(item.category);
          el.innerHTML = `
            <div class="item-img">
              ${item.image ? `<img src="${item.image}" onerror="this.style.display='none'">` : ''}
              <span style="position:relative;z-index:0;">${emoji}</span>
            </div>
            <div class="item-info">
              <div class="item-name">${item.title || 'Product'}</div>
              <div class="item-vendor">by ${item.vendorName || 'Vendor'}</div>
              <div class="item-condition ${item.condition==='New'?'new':'used'}">${item.condition||'Used'}</div>
              <div class="item-bottom">
                <div>
                  <div class="item-price">$${(Number(item.price||0) * (item.qty||1)).toFixed(2)}</div>
                  <div class="item-price-zwg">ZWG ${(Number(item.priceZWG||0) * (item.qty||1)).toFixed(0)}</div>
                </div>
                <div class="qty-control">
                  <button class="qty-btn" onclick="updateQty('${item.id}', -1)">−</button>
                  <div class="qty-val">${item.qty || 1}</div>
                  <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                </div>
              </div>
            </div>
            <button class="remove-btn" onclick="removeItem('${item.id}')">✕</button>`;
          list.appendChild(el);
        });
      });

      updateSummary();
    }

    // ── Update qty ───────────────────────────────────────────────
    window.updateQty = function(id, dir) {
      const idx = cart.findIndex(i => i.id === id);
      if (idx === -1) return;
      cart[idx].qty = Math.max(1, (cart[idx].qty || 1) + dir);
      localStorage.setItem('ma_cart', JSON.stringify(cart));
      renderCart();
    };

    // ── Remove item ──────────────────────────────────────────────
    window.removeItem = function(id) {
      cart = cart.filter(i => i.id !== id);
      localStorage.setItem('ma_cart', JSON.stringify(cart));
      showToast('Item removed', 'error');
      renderCart();
    };

    // ── Clear cart ───────────────────────────────────────────────
    window.clearCart = function() {
      if (!cart.length) return;
      if (!confirm('Remove all items from your cart?')) return;
      cart = [];
      localStorage.setItem('ma_cart', JSON.stringify(cart));
      renderCart();
    };

    // ── Update summary ───────────────────────────────────────────
    function updateSummary() {
      const subtotal = cart.reduce((s, i) => s + (Number(i.price||0) * (i.qty||1)), 0);
      const discountAmt = subtotal * discount;
      const total = subtotal + SERVICE_FEE - discountAmt;
      const totalZwg = total * ZWG_RATE;
      const itemCount = cart.reduce((s, i) => s + (i.qty || 1), 0);

      document.getElementById('itemCount').textContent  = itemCount;
      document.getElementById('subtotal').textContent   = `$${subtotal.toFixed(2)}`;
      document.getElementById('totalUsd').textContent   = `$${total.toFixed(2)}`;
      document.getElementById('totalZwg').textContent   = `ZWG ${totalZwg.toFixed(0)}`;

      if (discountAmt > 0) {
        document.getElementById('discountRow').style.display = 'flex';
        document.getElementById('discountVal').textContent = `-$${discountAmt.toFixed(2)}`;
      }

      // Save total for checkout
      localStorage.setItem('ma_cart_total', total.toFixed(2));
      localStorage.setItem('ma_order_notes', document.getElementById('orderNotes')?.value || '');
    }

    // ── Promo code ───────────────────────────────────────────────
    window.applyPromo = function() {
      const code = document.getElementById('promoInput').value.trim().toUpperCase();
      if (!code) { showToast('Enter a promo code', 'error'); return; }
      if (PROMO_CODES[code]) {
        discount = PROMO_CODES[code];
        showToast(`Promo applied! ${discount * 100}% off 🎉`, 'success');
        document.getElementById('promoInput').disabled = true;
        document.querySelector('.promo-btn').disabled  = true;
        updateSummary();
      } else {
        showToast('Invalid promo code', 'error');
      }
    };

    // ── Go to checkout ───────────────────────────────────────────
    window.goToCheckout = function() {
      // Save notes before leaving
      localStorage.setItem('ma_order_notes', document.getElementById('orderNotes').value);
      window.location.href = 'customer-checkout.html';
    };

    // ── Helpers ──────────────────────────────────────────────────
    function catEmoji(cat) {
      const m = { Clothing:'👕', Shoes:'👟', Accessories:'👜', Bags:'🎒', Vintage:'🕶️', Wholesale:'📦', Kids:'🧒' };
      return m[cat] || '🛍️';
    }

    window.showToast = function(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 2500);
    };
  </script>

</body>
</html>
