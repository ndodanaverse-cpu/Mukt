<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mukoto Avenue — Search</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232E7D32' width='100' height='100' rx='20'/><text x='50' y='70' font-size='60' text-anchor='middle' dominant-baseline='middle'>🛍️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #FAFAFA;
      font-family: 'Inter', sans-serif;
      padding-bottom: 80px;
    }

    @media (min-width: 768px) {
      body { padding-bottom: 100px; }
    }

    /* ── Top bar ── */
    .topbar {
      background: white;
      padding: 48px 16px 12px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    @media (min-width: 768px) {
      .topbar { padding: 56px 24px 16px; }
    }

    @media (min-width: 1024px) {
      .topbar { padding: 64px 32px 20px; }
    }
    .topbar-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .back-btn {
      width: 40px; height: 40px;
      background: #F3F4F6; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; border: none;
      text-decoration: none; flex-shrink: 0; transition: all 0.2s;
    }
    .back-btn:hover { background: #E5E7EB; }

    .search-wrap { flex: 1; position: relative; }
    .search-icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); font-size: 15px; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 13px 42px 13px 40px;
      border-radius: 12px; border: 1.5px solid #E5E7EB;
      background: #F9FAFB; font-size: 14px;
      font-family: 'Inter', sans-serif; outline: none;
      color: #1A1A1A; transition: all 0.2s;
    }
    .search-input:focus { border-color: #2E7D32; background: white; box-shadow: 0 0 0 3px rgba(46,125,50,0.08); }
    .search-input::placeholder { color: #9CA3AF; }
    .search-clear {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: #E5E7EB; border: none; border-radius: 50%;
      width: 20px; height: 20px;
      display: none; align-items: center; justify-content: center;
      font-size: 11px; cursor: pointer; color: #6B7280;
    }
    .search-clear.show { display: flex; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; align-items: center; gap: 8px;
      overflow-x: auto; scrollbar-width: none;
      padding: 12px 16px 2px;
    }

    @media (min-width: 768px) {\n      .filter-bar { padding: 16px 24px 4px; }\n    }

    @media (min-width: 1024px) {
      .filter-bar { padding: 20px 32px 6px; }
    }

    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 999px;
      border: 1.5px solid #E5E7EB; background: white;
      font-size: 12px; font-weight: 600; color: #374151;
      white-space: nowrap; cursor: pointer;
      transition: all 0.2s; flex-shrink: 0;
    }
    .filter-btn:hover { border-color: #2E7D32; color: #2E7D32; }
    .filter-btn.active {
      background: #2E7D32; border-color: #2E7D32;
      color: white; box-shadow: 0 3px 10px rgba(46,125,50,0.25);
    }

    /* ── Filter drawer ── */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .drawer-overlay.show { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-radius: 24px 24px 0 0;
      z-index: 300; padding: 0 20px 40px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      max-height: 85vh; overflow-y: auto; scrollbar-width: none;
    }
    .drawer::-webkit-scrollbar { display: none; }
    .drawer.show { transform: translateY(0); }

    .drawer-handle {
      width: 40px; height: 4px; background: #E5E7EB;
      border-radius: 999px; margin: 14px auto 20px;
    }
    .drawer-title {
      font-family: 'Poppins', sans-serif;
      font-size: 18px; font-weight: 800; color: #1A1A1A;
      margin-bottom: 20px;
    }
    .drawer-section { margin-bottom: 24px; }
    .drawer-label {
      font-size: 12px; font-weight: 700; color: #374151;
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 12px;
    }
    .drawer-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .drawer-chip {
      padding: 8px 16px; border-radius: 999px;
      border: 1.5px solid #E5E7EB; background: white;
      font-size: 13px; font-weight: 600; color: #374151;
      cursor: pointer; transition: all 0.2s;
    }
    .drawer-chip.active {
      background: #2E7D32; border-color: #2E7D32; color: white;
    }

    /* Price range */
    .price-range {
      display: flex; align-items: center; gap: 12px;
    }
    .price-input {
      flex: 1; padding: 10px 12px;
      border: 1.5px solid #E5E7EB; border-radius: 10px;
      font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; color: #1A1A1A;
    }
    .price-input:focus { border-color: #2E7D32; }
    .price-sep { color: #9CA3AF; font-weight: 600; }

    /* Condition toggle */
    .condition-toggle {
      display: flex; gap: 10px;
    }
    .cond-btn {
      flex: 1; padding: 10px;
      border-radius: 10px; border: 1.5px solid #E5E7EB;
      background: white; font-size: 13px; font-weight: 600;
      color: #374151; cursor: pointer; transition: all 0.2s;
      text-align: center;
    }
    .cond-btn.active { background: #2E7D32; border-color: #2E7D32; color: white; }

    /* Rating filter */
    .rating-btns { display: flex; gap: 8px; }
    .rating-btn {
      flex: 1; padding: 9px 8px;
      border-radius: 10px; border: 1.5px solid #E5E7EB;
      background: white; font-size: 12px; font-weight: 600;
      color: #374151; cursor: pointer; transition: all 0.2s;
      text-align: center; white-space: nowrap;
    }
    .rating-btn.active { background: #F9A825; border-color: #F9A825; color: white; }

    .drawer-actions { display: flex; gap: 12px; margin-top: 8px; }
    .btn-clear {
      flex: 1; padding: 14px; border-radius: 12px;
      border: 1.5px solid #E5E7EB; background: white;
      font-family: 'Poppins', sans-serif; font-size: 14px;
      font-weight: 700; color: #374151; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-clear:hover { border-color: #EF5350; color: #EF5350; }
    .btn-apply {
      flex: 2; padding: 14px; border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #2E7D32, #1B5E20);
      font-family: 'Poppins', sans-serif; font-size: 14px;
      font-weight: 700; color: white; cursor: pointer;
      box-shadow: 0 4px 16px rgba(46,125,50,0.3);
      transition: all 0.2s;
    }
    .btn-apply:hover { transform: translateY(-1px); }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: white;
      border-bottom: 1px solid #F3F4F6;
      padding: 0 16px;
    }
    .tab {
      flex: 1; padding: 14px 0;
      text-align: center;
      font-size: 13px; font-weight: 700; color: #9CA3AF;
      cursor: pointer; border-bottom: 2.5px solid transparent;
      transition: all 0.2s;
    }
    .tab.active { color: #2E7D32; border-bottom-color: #2E7D32; }

    /* ── Results header ── */
    .results-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
    }
    .results-count {
      font-size: 13px; color: #6B7280; font-weight: 500;
    }
    .results-count strong { color: #1A1A1A; font-weight: 700; }
    .sort-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; color: #374151;
      background: white; border: 1.5px solid #E5E7EB;
      border-radius: 999px; padding: 6px 12px;
      cursor: pointer; transition: all 0.2s;
    }
    .sort-btn:hover { border-color: #2E7D32; color: #2E7D32; }

    /* ── Product grid ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 0 16px;
    }

    @media (min-width: 768px) {
      .products-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 0 24px;
      }
    }

    @media (min-width: 1024px) {
      .products-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        padding: 0 32px;
      }
    }

    @media (min-width: 1440px) {
      .products-grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 16px;
        padding: 0 40px;
      }
    }
    .product-card {
      background: white; border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      cursor: pointer; transition: all 0.2s;
      text-decoration: none; display: block;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    .product-img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover;
      background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; position: relative;
    }
    .product-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      position: absolute; inset: 0;
    }
    .product-condition {
      position: absolute; top: 8px; left: 8px;
      padding: 3px 8px; border-radius: 999px;
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .product-condition.new { background: rgba(46,125,50,0.9); color: white; }
    .product-condition.used { background: rgba(249,168,37,0.9); color: white; }
    .heart-btn {
      position: absolute; top: 8px; right: 8px;
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.92); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; border: none; cursor: pointer;
      transition: all 0.2s;
    }
    .heart-btn:hover { transform: scale(1.15); }
    .heart-btn.liked { background: #fee2e2; }

    .product-info { padding: 8px 10px 10px; }
    .product-name {
      font-family: 'Poppins', sans-serif;
      font-size: 11px; font-weight: 700; color: #1A1A1A;
      margin-bottom: 2px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3;
      line-clamp: 2;
    }

    @media (min-width: 768px) {
      .product-name { font-size: 12px; }
    }

    @media (min-width: 1024px) {
      .product-name { font-size: 13px; }
    }
    .product-vendor { font-size: 9px; color: #9CA3AF; margin-bottom: 4px; }
    .product-price {
      font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 800; color: #2E7D32;
    }
    .product-price-zwg { font-size: 9px; color: #9CA3AF; }

    @media (min-width: 768px) {
      .product-vendor { font-size: 10px; margin-bottom: 5px; }
      .product-price { font-size: 14px; }
      .product-price-zwg { font-size: 10px; }
    }

    @media (min-width: 1024px) {
      .product-price { font-size: 15px; }
    }

    /* ── Vendor list ── */
    .vendors-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
    .vendor-row {
      background: white; border-radius: 16px;
      padding: 16px; display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      text-decoration: none; transition: all 0.2s;
    }
    .vendor-row:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .vendor-avatar {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0; overflow: hidden;
    }
    .vendor-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .vendor-info { flex: 1; min-width: 0; }
    .vendor-name {
      font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 700; color: #1A1A1A;
      margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vendor-cat { font-size: 12px; color: #6B7280; margin-bottom: 4px; }
    .vendor-meta { display: flex; align-items: center; gap: 10px; }
    .vendor-rating { font-size: 11px; font-weight: 600; color: #374151; }
    .vendor-status {
      font-size: 10px; font-weight: 700; padding: 2px 8px;
      border-radius: 999px;
    }
    .vendor-status.open { background: #e8f5e9; color: #2E7D32; }
    .vendor-status.closed { background: #fef2f2; color: #EF5350; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite; border-radius: 16px;
    }
    .skeleton-product { height: 220px; }
    .skeleton-vendor { height: 88px; border-radius: 16px; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 60px 20px; display: none;
    }
    .empty-state.show { display: block; }
    .empty-emoji { font-size: 52px; margin-bottom: 14px; }
    .empty-title {
      font-family: 'Poppins', sans-serif;
      font-size: 18px; font-weight: 800; color: #1A1A1A; margin-bottom: 8px;
    }
    .empty-desc { font-size: 14px; color: #9CA3AF; line-height: 1.6; }

    /* ── Recent searches ── */
    .recent-section { padding: 16px; }
    .recent-title {
      font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 700; color: #1A1A1A; margin-bottom: 12px;
    }
    .recent-list { display: flex; flex-direction: column; gap: 2px; }
    .recent-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 12px; border-radius: 10px;
      cursor: pointer; transition: background 0.2s;
    }
    .recent-item:hover { background: #F9FAFB; }
    .recent-icon { font-size: 15px; color: #9CA3AF; }
    .recent-text { flex: 1; font-size: 14px; color: #374151; }
    .recent-remove {
      font-size: 12px; color: #D1D5DB; cursor: pointer;
      padding: 2px 6px; border-radius: 4px;
      transition: color 0.2s;
    }
    .recent-remove:hover { color: #EF5350; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #F3F4F6;
      display: flex; padding: 10px 0 20px; z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      cursor: pointer; text-decoration: none; padding: 4px 0;
    }
    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; font-weight: 600; color: #9CA3AF; }
    .nav-item.active .nav-label { color: #2E7D32; }
    .nav-dot { width: 4px; height: 4px; background: #2E7D32; border-radius: 50%; display: none; }
    .nav-item.active .nav-dot { display: block; }

    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-row">
      <a href="customer-home.html" class="back-btn">←</a>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text"
          placeholder="Search products, vendors..."
          autofocus oninput="handleInput(this.value)"/>
        <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn" id="filterToggle" onclick="openDrawer()">⚙️ Filters</button>
      <button class="filter-btn active" id="catAll" onclick="setCat('all', this)">🏷️ All</button>
      <button class="filter-btn" onclick="setCat('Clothing', this)">👕 Clothing</button>
      <button class="filter-btn" onclick="setCat('Shoes', this)">👟 Shoes</button>
      <button class="filter-btn" onclick="setCat('Vintage', this)">🕶️ Vintage</button>
      <button class="filter-btn" onclick="setCat('Accessories', this)">👜 Accessories</button>
      <button class="filter-btn" onclick="setCat('Wholesale', this)">📦 Wholesale</button>
      <button class="filter-btn" onclick="setCat('Kids', this)">🧒 Kids</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs" style="display:none;">
    <div class="tab active" id="tabProducts" onclick="switchTab('products')">Products</div>
    <div class="tab" id="tabVendors" onclick="switchTab('vendors')">Vendors</div>
  </div>

  <!-- Results header -->
  <div class="results-header" id="resultsHeader" style="display:none;">
    <div class="results-count" id="resultsCount"></div>
    <button class="sort-btn" onclick="toggleSort()">⇅ <span id="sortLabel">Newest</span></button>
  </div>

  <!-- Products grid -->
  <div class="products-grid" id="productsGrid"></div>

  <!-- Vendors list -->
  <div class="vendors-list" id="vendorsList" style="display:none;"></div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="empty-emoji">🔍</div>
    <div class="empty-title">No results found</div>
    <div class="empty-desc">Try different keywords or adjust your filters</div>
  </div>

  <!-- Recent searches (shown when input empty) -->
  <div class="recent-section" id="recentSection">
    <div class="recent-title">Recent Searches</div>
    <div class="recent-list" id="recentList"></div>
  </div>

  <!-- Filter drawer -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Filter Results</div>

    <div class="drawer-section">
      <div class="drawer-label">Category</div>
      <div class="drawer-chips">
        <div class="drawer-chip active" onclick="toggleDrawerChip(this,'cat','all')">All</div>
        <div class="drawer-chip" onclick="toggleDrawerChip(this,'cat','Clothing')">👕 Clothing</div>
        <div class="drawer-chip" onclick="toggleDrawerChip(this,'cat','Shoes')">👟 Shoes</div>
        <div class="drawer-chip" onclick="toggleDrawerChip(this,'cat','Vintage')">🕶️ Vintage</div>
        <div class="drawer-chip" onclick="toggleDrawerChip(this,'cat','Accessories')">👜 Accessories</div>
        <div class="drawer-chip" onclick="toggleDrawerChip(this,'cat','Wholesale')">📦 Wholesale</div>
        <div class="drawer-chip" onclick="toggleDrawerChip(this,'cat','Kids')">🧒 Kids</div>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-label">Price Range (USD)</div>
      <div class="price-range">
        <input class="price-input" id="priceMin" type="number" placeholder="Min $" min="0"/>
        <span class="price-sep">—</span>
        <input class="price-input" id="priceMax" type="number" placeholder="Max $" min="0"/>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-label">Condition</div>
      <div class="condition-toggle">
        <button class="cond-btn active" id="condAll" onclick="setCond('all')">All</button>
        <button class="cond-btn" id="condNew" onclick="setCond('New')">New</button>
        <button class="cond-btn" id="condUsed" onclick="setCond('Used')">Used</button>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-label">Minimum Rating</div>
      <div class="rating-btns">
        <button class="rating-btn active" id="rat0" onclick="setRating(0)">Any</button>
        <button class="rating-btn" id="rat3" onclick="setRating(3)">3★+</button>
        <button class="rating-btn" id="rat4" onclick="setRating(4)">4★+</button>
        <button class="rating-btn" id="rat45" onclick="setRating(4.5)">4.5★+</button>
      </div>
    </div>

    <div class="drawer-actions">
      <button class="btn-clear" onclick="clearFilters()">Clear All</button>
      <button class="btn-apply" onclick="applyFilters()">Apply Filters</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="customer-home.html" class="nav-item">
      <div class="nav-icon">🏠</div><div class="nav-label">Home</div><div class="nav-dot"></div>
    </a>
    <a href="customer-map.html" class="nav-item">
      <div class="nav-icon">🗺️</div><div class="nav-label">Map</div><div class="nav-dot"></div>
    </a>
    <a href="customer-orders.html" class="nav-item">
      <div class="nav-icon">📦</div><div class="nav-label">Orders</div><div class="nav-dot"></div>
    </a>
    <a href="shared-chat-list.html" class="nav-item">
      <div class="nav-icon">💬</div><div class="nav-label">Messages</div><div class="nav-dot"></div>
    </a>
    <a href="customer-profile.html" class="nav-item">
      <div class="nav-icon">👤</div><div class="nav-label">Profile</div><div class="nav-dot"></div>
    </a>
  </nav>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, query, where,
      orderBy, limit, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2vGB7iehqse--Th5wds1MoU4ZHr_DYY4",
      authDomain: "mukoto-avenue-3758a.firebaseapp.com",
      projectId: "mukoto-avenue-3758a",
      storageBucket: "mukoto-avenue-3758a.firebasestorage.app",
      messagingSenderId: "172793539743",
      appId: "1:172793539743:web:46fae0bd5be1ecedebc6aa",
      measurementId: "G-VN9T6FEVJ0"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let allProducts  = [];
    let allVendors   = [];
    let savedItems   = JSON.parse(localStorage.getItem('ma_saved') || '[]');
    let activeTab    = 'products';
    let sortMode     = 'newest';
    let filters      = { cat: 'all', condition: 'all', minPrice: 0, maxPrice: 9999, minRating: 0 };
    let searchTimer  = null;

    // ── Auth guard ───────────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (!user) { window.location.href = 'login.html'; return; }
      renderRecent();
      // Auto-run saved query from home page
      const saved = localStorage.getItem('ma_search_query');
      if (saved) {
        document.getElementById('searchInput').value = saved;
        localStorage.removeItem('ma_search_query');
        runSearch(saved);
      }
    });

    // ── Input handler ────────────────────────────────────────────
    window.handleInput = function(val) {
      const clearBtn = document.getElementById('clearBtn');
      clearBtn.classList.toggle('show', val.length > 0);

      if (!val.trim()) {
        showRecent();
        return;
      }

      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => runSearch(val), 350);
    };

    // ── Run search ───────────────────────────────────────────────
    async function runSearch(val) {
      const q = val.trim().toLowerCase();
      if (!q) { showRecent(); return; }

      saveRecent(q);
      hideRecent();
      showSkeletons();

      try {
        // Fetch products
        const pSnap = await getDocs(query(
          collection(db, 'products'),
          where('isAvailable', '==', true),
          limit(50)
        ));
        allProducts = [];
        pSnap.forEach(d => allProducts.push({ id: d.id, ...d.data() }));

        // Fetch vendors
        const vSnap = await getDocs(query(
          collection(db, 'vendors'),
          where('isActive', '==', true),
          limit(30)
        ));
        allVendors = [];
        vSnap.forEach(d => allVendors.push({ id: d.id, ...d.data() }));

        // Filter by query
        const filteredP = allProducts.filter(p =>
          (p.title || '').toLowerCase().includes(q) ||
          (p.description || '').toLowerCase().includes(q) ||
          (p.category || '').toLowerCase().includes(q) ||
          (p.vendorName || '').toLowerCase().includes(q) ||
          (p.tags || []).some(t => t.toLowerCase().includes(q))
        );

        const filteredV = allVendors.filter(v =>
          (v.shopName || '').toLowerCase().includes(q) ||
          (v.category || '').toLowerCase().includes(q) ||
          (v.description || '').toLowerCase().includes(q)
        );

        applyAndRender(filteredP, filteredV);

      } catch (err) {
        console.error('Search error:', err);
        showEmpty();
      }
    }

    // ── Apply filters and render ─────────────────────────────────
    function applyAndRender(products, vendors) {
      let fp = products.filter(p => {
        const price = Number(p.price || 0);
        const cat   = p.category || '';
        const cond  = p.condition || '';
        if (filters.cat !== 'all' && cat !== filters.cat) return false;
        if (price < filters.minPrice || price > filters.maxPrice) return false;
        if (filters.condition !== 'all' && cond !== filters.condition) return false;
        return true;
      });

      let fv = vendors.filter(v => {
        const rating = v.rating || 0;
        return rating >= filters.minRating;
      });

      // Sort products
      if (sortMode === 'price-asc') fp.sort((a,b) => (a.price||0) - (b.price||0));
      else if (sortMode === 'price-desc') fp.sort((a,b) => (b.price||0) - (a.price||0));

      renderTabs(fp, fv);
      renderProducts(fp);
      renderVendors(fv);

      const total = activeTab === 'products' ? fp.length : fv.length;
      updateResultsHeader(total);
    }

    // ── Render products ──────────────────────────────────────────
    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      if (!products.length && activeTab === 'products') { showEmpty(); return; }

      grid.style.display = activeTab === 'products' ? 'grid' : 'none';
      document.getElementById('emptyState').classList.remove('show');

      grid.innerHTML = products.map(p => {
        const isSaved = savedItems.includes(p.id);
        const emoji   = catEmoji(p.category);
        return `
          <a href="customer-product-detail.html?id=${p.id}" class="product-card">
            <div class="product-img">
              ${p.images?.[0] ? `<img src="${p.images[0]}" onerror="this.style.display='none'">` : ''}
              <span style="position:relative;z-index:0;">${emoji}</span>
              <div class="product-condition ${p.condition==='New'?'new':'used'}">${p.condition||'Used'}</div>
              <button class="heart-btn ${isSaved?'liked':''}"
                onclick="toggleSave(event,'${p.id}')">${isSaved?'❤️':'🤍'}</button>
            </div>
            <div class="product-info">
              <div class="product-name">${p.title||'Product'}</div>
              <div class="product-vendor">by ${p.vendorName||'Vendor'}</div>
              <div class="product-price">$${Number(p.price||0).toFixed(2)}</div>
              <div class="product-price-zwg">ZWG ${Number(p.priceZWG||(p.price*36)||0).toFixed(0)}</div>
            </div>
          </a>`;
      }).join('');
    }

    // ── Render vendors ───────────────────────────────────────────
    function renderVendors(vendors) {
      const list = document.getElementById('vendorsList');
      list.style.display = activeTab === 'vendors' ? 'flex' : 'none';

      if (!vendors.length && activeTab === 'vendors') { showEmpty(); return; }
      document.getElementById('emptyState').classList.remove('show');

      list.innerHTML = vendors.map(v => {
        const emoji  = catEmoji(v.category);
        const rating = v.rating ? v.rating.toFixed(1) : '—';
        return `
          <a href="customer-vendor-profile.html?id=${v.id}" class="vendor-row">
            <div class="vendor-avatar">
              ${v.profilePhoto ? `<img src="${v.profilePhoto}" onerror="this.style.display='none'">` : ''}
              <span>${emoji}</span>
            </div>
            <div class="vendor-info">
              <div class="vendor-name">${v.shopName||'Shop'}</div>
              <div class="vendor-cat">${v.category||'General'}</div>
              <div class="vendor-meta">
                <div class="vendor-rating">⭐ ${rating}</div>
                <div class="vendor-status ${v.isActive?'open':'closed'}">
                  ${v.isActive?'Open':'Closed'}
                </div>
              </div>
            </div>
            <span style="color:#9CA3AF;font-size:18px;">›</span>
          </a>`;
      }).join('');
    }

    // ── Tabs ─────────────────────────────────────────────────────
    function renderTabs(products, vendors) {
      document.getElementById('tabs').style.display = 'flex';
      document.getElementById('resultsHeader').style.display = 'flex';
      document.getElementById('tabProducts').textContent = `Products (${products.length})`;
      document.getElementById('tabVendors').textContent  = `Vendors (${vendors.length})`;
    }

    window.switchTab = function(tab) {
      activeTab = tab;
      document.getElementById('tabProducts').classList.toggle('active', tab === 'products');
      document.getElementById('tabVendors').classList.toggle('active', tab === 'vendors');
      document.getElementById('productsGrid').style.display = tab === 'products' ? 'grid' : 'none';
      document.getElementById('vendorsList').style.display  = tab === 'vendors'  ? 'flex' : 'none';

      const count = tab === 'products'
        ? document.querySelectorAll('.product-card').length
        : document.querySelectorAll('.vendor-row').length;
      updateResultsHeader(count);

      if (count === 0) showEmpty();
      else document.getElementById('emptyState').classList.remove('show');
    };

    // ── Category quick filter ────────────────────────────────────
    window.setCat = function(cat, el) {
      document.querySelectorAll('.filter-bar .filter-btn:not(#filterToggle)')
        .forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      filters.cat = cat;
      const q = document.getElementById('searchInput').value;
      if (q.trim()) runSearch(q);
    };

    // ── Sort toggle ──────────────────────────────────────────────
    window.toggleSort = function() {
      const modes  = ['newest', 'price-asc', 'price-desc'];
      const labels = ['Newest', 'Price ↑', 'Price ↓'];
      const idx    = modes.indexOf(sortMode);
      sortMode = modes[(idx + 1) % modes.length];
      document.getElementById('sortLabel').textContent = labels[(idx + 1) % modes.length];
      const q = document.getElementById('searchInput').value;
      if (q.trim()) runSearch(q);
    };

    // ── Drawer ───────────────────────────────────────────────────
    window.openDrawer  = () => { document.getElementById('drawerOverlay').classList.add('show'); document.getElementById('drawer').classList.add('show'); };
    window.closeDrawer = () => { document.getElementById('drawerOverlay').classList.remove('show'); document.getElementById('drawer').classList.remove('show'); };

    window.toggleDrawerChip = function(el, group, val) {
      el.closest('.drawer-chips').querySelectorAll('.drawer-chip')
        .forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      if (group === 'cat') filters.cat = val;
    };

    window.setCond = function(val) {
      filters.condition = val;
      ['condAll','condNew','condUsed'].forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById('cond' + (val === 'all' ? 'All' : val)).classList.add('active');
    };

    window.setRating = function(val) {
      filters.minRating = val;
      ['rat0','rat3','rat4','rat45'].forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById('rat' + String(val).replace('.','') ).classList.add('active');
    };

    window.clearFilters = function() {
      filters = { cat: 'all', condition: 'all', minPrice: 0, maxPrice: 9999, minRating: 0 };
      document.getElementById('priceMin').value = '';
      document.getElementById('priceMax').value = '';
      setCond('all'); setRating(0);
      document.querySelectorAll('.drawer-chips .drawer-chip').forEach((c,i) => c.classList.toggle('active', i===0));
    };

    window.applyFilters = function() {
      filters.minPrice = Number(document.getElementById('priceMin').value) || 0;
      filters.maxPrice = Number(document.getElementById('priceMax').value) || 9999;
      closeDrawer();
      const q = document.getElementById('searchInput').value;
      if (q.trim()) runSearch(q);
    };

    // ── Save / unsave ────────────────────────────────────────────
    window.toggleSave = function(e, id) {
      e.preventDefault(); e.stopPropagation();
      const idx = savedItems.indexOf(id);
      if (idx === -1) savedItems.push(id);
      else savedItems.splice(idx, 1);
      localStorage.setItem('ma_saved', JSON.stringify(savedItems));
      const q = document.getElementById('searchInput').value;
      if (q.trim()) runSearch(q);
    };

    // ── Recent searches ──────────────────────────────────────────
    function saveRecent(q) {
      let recent = JSON.parse(localStorage.getItem('ma_recent') || '[]');
      recent = [q, ...recent.filter(r => r !== q)].slice(0, 8);
      localStorage.setItem('ma_recent', JSON.stringify(recent));
    }

    function renderRecent() {
      const recent = JSON.parse(localStorage.getItem('ma_recent') || '[]');
      const list   = document.getElementById('recentList');
      if (!recent.length) {
        document.getElementById('recentSection').style.display = 'none';
        return;
      }
      list.innerHTML = recent.map(r => `
        <div class="recent-item" onclick="useRecent('${r}')">
          <span class="recent-icon">🕐</span>
          <span class="recent-text">${r}</span>
          <span class="recent-remove" onclick="removeRecent(event,'${r}')">✕</span>
        </div>`).join('');
    }

    window.useRecent = function(q) {
      document.getElementById('searchInput').value = q;
      document.getElementById('clearBtn').classList.add('show');
      runSearch(q);
    };

    window.removeRecent = function(e, q) {
      e.stopPropagation();
      let recent = JSON.parse(localStorage.getItem('ma_recent') || '[]');
      recent = recent.filter(r => r !== q);
      localStorage.setItem('ma_recent', JSON.stringify(recent));
      renderRecent();
    };

    // ── UI helpers ───────────────────────────────────────────────
    function showSkeletons() {
      hideRecent();
      document.getElementById('tabs').style.display = 'none';
      document.getElementById('resultsHeader').style.display = 'none';
      document.getElementById('emptyState').classList.remove('show');
      document.getElementById('vendorsList').style.display = 'none';
      document.getElementById('productsGrid').style.display = 'grid';
      document.getElementById('productsGrid').innerHTML = `
        <div class="skeleton skeleton-product"></div>
        <div class="skeleton skeleton-product"></div>
        <div class="skeleton skeleton-product"></div>
        <div class="skeleton skeleton-product"></div>`;
    }

    function showEmpty() {
      document.getElementById('productsGrid').innerHTML = '';
      document.getElementById('vendorsList').innerHTML  = '';
      document.getElementById('emptyState').classList.add('show');
    }

    function showRecent() {
      document.getElementById('recentSection').style.display = 'block';
      document.getElementById('tabs').style.display = 'none';
      document.getElementById('resultsHeader').style.display = 'none';
      document.getElementById('productsGrid').innerHTML = '';
      document.getElementById('vendorsList').innerHTML  = '';
      document.getElementById('emptyState').classList.remove('show');
      renderRecent();
    }

    function hideRecent() {
      document.getElementById('recentSection').style.display = 'none';
    }

    function updateResultsHeader(count) {
      const q = document.getElementById('searchInput').value;
      document.getElementById('resultsCount').innerHTML =
        `<strong>${count}</strong> result${count !== 1 ? 's' : ''} for "<strong>${q}</strong>"`;
    }

    window.clearSearch = function() {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').classList.remove('show');
      showRecent();
    };

    function catEmoji(cat) {
      const m = { Clothing:'👕', Shoes:'👟', Accessories:'👜', Bags:'🎒', Vintage:'🕶️', Wholesale:'📦', Kids:'🧒' };
      return m[cat] || '🛍️';
    }
  </script>

</body>
</html>
