<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mukoto Avenue — Messages</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232E7D32' width='100' height='100' rx='20'/><text x='50' y='70' font-size='60' text-anchor='middle' dominant-baseline='middle'>🛍️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #FAFAFA;
      font-family: 'Inter', sans-serif;
      padding-bottom: 90px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(160deg, #2E7D32 0%, #1B5E20 100%);
      padding: 52px 20px 20px;
      position: sticky; top: 0; z-index: 100;
    }
    .header-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 14px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; border: none;
      color: white; text-decoration: none; transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.25); }
    .header-title {
      font-family: 'Poppins', sans-serif;
      font-size: 20px; font-weight: 800; color: white;
    }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 1px; }
    .compose-btn {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; border: none;
      color: white; transition: all 0.2s;
    }
    .compose-btn:hover { background: rgba(255,255,255,0.25); }

    /* Search */
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); font-size: 14px; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 11px 11px 11px 38px;
      border-radius: 12px; border: none;
      background: rgba(255,255,255,0.15);
      color: white; font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none; transition: background 0.2s;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.6); }
    .search-input:focus { background: rgba(255,255,255,0.22); }

    /* ── Online contacts strip ── */
    .online-strip {
      padding: 14px 16px 0;
    }
    .online-title {
      font-size: 11px; font-weight: 700; color: #9CA3AF;
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 12px;
    }
    .online-scroll {
      display: flex; gap: 14px;
      overflow-x: auto; scrollbar-width: none;
      padding-bottom: 4px;
    }
    .online-scroll::-webkit-scrollbar { display: none; }
    .online-avatar-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 5px; flex-shrink: 0;
      cursor: pointer;
    }
    .online-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, #F9A825, #F57F17);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: white;
      font-family: 'Poppins', sans-serif;
      position: relative; overflow: hidden;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .online-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .online-dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #4CAF50; border: 2px solid white;
    }
    .online-name {
      font-size: 10px; font-weight: 600; color: #374151;
      text-align: center; max-width: 52px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Conversations section ── */
    .section-label {
      padding: 16px 16px 8px;
      font-size: 11px; font-weight: 700; color: #9CA3AF;
      text-transform: uppercase; letter-spacing: 0.8px;
    }

    /* Conversation row */
    .conv-list {
      display: flex; flex-direction: column;
    }
    .conv-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: white; cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #F9FAFB;
      text-decoration: none;
      position: relative;
    }
    .conv-row:first-child { border-top: 1px solid #F9FAFB; }
    .conv-row:hover { background: #F9FAFB; }
    .conv-row.unread { background: #FAFFF8; }

    .conv-avatar {
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg, #2E7D32, #1B5E20);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: white;
      font-family: 'Poppins', sans-serif;
      flex-shrink: 0; position: relative; overflow: hidden;
    }
    .conv-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .conv-avatar.vendor-avatar { background: linear-gradient(135deg, #2E7D32, #1B5E20); }
    .conv-avatar.customer-avatar { background: linear-gradient(135deg, #1565C0, #0D47A1); }

    .conv-online-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 13px; height: 13px; border-radius: 50%;
      background: #4CAF50; border: 2.5px solid white;
    }

    .conv-body { flex: 1; min-width: 0; }
    .conv-name-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 3px;
    }
    .conv-name {
      font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 700; color: #1A1A1A;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 200px;
    }
    .conv-time { font-size: 11px; color: #9CA3AF; flex-shrink: 0; }

    .conv-preview-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
    }
    .conv-preview {
      font-size: 13px; color: #9CA3AF;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1;
    }
    .conv-preview.unread-text { color: #374151; font-weight: 600; }
    .conv-unread-badge {
      width: 20px; height: 20px; border-radius: 50%;
      background: #2E7D32; color: white;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* Mute / Archive swipe hint */
    .conv-actions-hint {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      display: flex; gap: 8px; opacity: 0;
      transition: opacity 0.2s;
    }
    .conv-row:hover .conv-actions-hint { opacity: 1; }
    .hint-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .hint-btn.mute   { background: #F3F4F6; }
    .hint-btn.delete { background: #fef2f2; }
    .hint-btn:hover  { transform: scale(1.1); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 60px 20px; display: none;
    }
    .empty-state.show { display: block; }
    .empty-emoji { font-size: 56px; margin-bottom: 14px; }
    .empty-title {
      font-family: 'Poppins', sans-serif;
      font-size: 18px; font-weight: 800; color: #1A1A1A; margin-bottom: 8px;
    }
    .empty-desc { font-size: 14px; color: #9CA3AF; line-height: 1.6; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .skeleton-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-bottom: 1px solid #F9FAFB;
    }
    .skeleton-avatar { width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-body { flex: 1; }
    .skeleton-line { height: 12px; border-radius: 6px; margin-bottom: 8px; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #F3F4F6;
      display: flex; padding: 10px 0 20px; z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      cursor: pointer; text-decoration: none; padding: 4px 0;
    }
    .nav-icon { font-size: 22px; position: relative; }
    .nav-label { font-size: 10px; font-weight: 600; color: #9CA3AF; }
    .nav-item.active .nav-label { color: #2E7D32; }
    .nav-dot { width: 4px; height: 4px; background: #2E7D32; border-radius: 50%; display: none; }
    .nav-item.active .nav-dot { display: block; }
    .nav-badge {
      position: absolute; top: -3px; right: -5px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #EF5350; color: white;
      font-size: 9px; font-weight: 700;
      display: none; align-items: center; justify-content: center;
    }
    .nav-badge.show { display: flex; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <div class="header-left">
        <a href="javascript:history.back()" class="back-btn">←</a>
        <div>
          <div class="header-title">Messages</div>
          <div class="header-sub" id="msgSubText">Loading...</div>
        </div>
      </div>
      <button class="compose-btn" onclick="composeNew()">✏️</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text"
        placeholder="Search conversations..."
        oninput="filterConvs(this.value)"/>
    </div>
  </div>

  <!-- Online contacts -->
  <div class="online-strip" id="onlineStrip" style="display:none;">
    <div class="online-title">Online Now</div>
    <div class="online-scroll" id="onlineScroll"></div>
  </div>

  <!-- Conversations -->
  <div class="section-label" id="convLabel" style="display:none;">Recent</div>
  <div class="conv-list" id="convList">
    <!-- Skeletons -->
    <div class="skeleton-row">
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line" style="width:60%;"></div>
        <div class="skeleton skeleton-line" style="width:80%;margin-bottom:0;"></div>
      </div>
    </div>
    <div class="skeleton-row">
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line" style="width:50%;"></div>
        <div class="skeleton skeleton-line" style="width:70%;margin-bottom:0;"></div>
      </div>
    </div>
    <div class="skeleton-row">
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line" style="width:65%;"></div>
        <div class="skeleton skeleton-line" style="width:85%;margin-bottom:0;"></div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="empty-emoji">💬</div>
    <div class="empty-title">No messages yet</div>
    <div class="empty-desc">When you contact a vendor or a customer messages you, conversations will appear here.</div>
  </div>

  <!-- Bottom Nav — dynamic based on role -->
  <nav class="bottom-nav" id="bottomNav"></nav>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, query, where,
      orderBy, getDocs, doc, getDoc, onSnapshot,
      addDoc, serverTimestamp, or
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2vGB7iehqse--Th5wds1MoU4ZHr_DYY4",
      authDomain: "mukoto-avenue-3758a.firebaseapp.com",
      projectId: "mukoto-avenue-3758a",
      storageBucket: "mukoto-avenue-3758a.firebasestorage.app",
      messagingSenderId: "172793539743",
      appId: "1:172793539743:web:46fae0bd5be1ecedebc6aa",
      measurementId: "G-VN9T6FEVJ0"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    let userRole    = 'customer';
    let allConvs    = [];
    let unsubscribe = null;

    // ── Auth guard ───────────────────────────────────────────────
    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;

      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) userRole = snap.data().role || 'customer';

      renderBottomNav();
      subscribeToChats();
    });

    // ── Subscribe to chats (real-time) ───────────────────────────
    function subscribeToChats() {
      if (unsubscribe) unsubscribe();

      try {
        const q = query(
          collection(db, 'chats'),
          where('participantIds', 'array-contains', currentUser.uid),
          orderBy('lastMessageTime', 'desc')
        );

        unsubscribe = onSnapshot(q, snap => {
          allConvs = [];
          snap.forEach(d => allConvs.push({ id: d.id, ...d.data() }));
          renderConvs(allConvs);
          updateSubText();
        }, err => {
          console.error('Chat snapshot error:', err);
          loadChatsFallback();
        });
      } catch (err) {
        loadChatsFallback();
      }
    }

    async function loadChatsFallback() {
      try {
        const q    = query(
          collection(db, 'chats'),
          where('participantIds', 'array-contains', currentUser.uid)
        );
        const snap = await getDocs(q);
        allConvs   = [];
        snap.forEach(d => allConvs.push({ id: d.id, ...d.data() }));
        allConvs.sort((a,b) => {
          const ta = a.lastMessageTime?.toDate?.() || new Date(0);
          const tb = b.lastMessageTime?.toDate?.() || new Date(0);
          return tb - ta;
        });
        renderConvs(allConvs);
        updateSubText();
      } catch (e) {
        console.error(e);
        renderConvs([]);
      }
    }

    // ── Render conversations ─────────────────────────────────────
    function renderConvs(convs) {
      const list  = document.getElementById('convList');
      const empty = document.getElementById('emptyState');
      const label = document.getElementById('convLabel');

      if (!convs.length) {
        list.innerHTML = '';
        empty.classList.add('show');
        label.style.display = 'none';
        document.getElementById('onlineStrip').style.display = 'none';
        return;
      }

      empty.classList.remove('show');
      label.style.display = 'block';

      // Build online strip from convs
      renderOnlineStrip(convs);

      list.innerHTML = convs.map(conv => {
        const otherId   = conv.participantIds?.find(id => id !== currentUser.uid) || '';
        const otherName = getOtherName(conv);
        const initials  = otherName.substring(0,2).toUpperCase();
        const lastMsg   = conv.lastMessage || 'Start a conversation';
        const isUnread  = (conv.unreadCounts?.[currentUser.uid] || 0) > 0;
        const unreadNum = conv.unreadCounts?.[currentUser.uid] || 0;
        const time      = conv.lastMessageTime?.toDate
          ? formatTime(conv.lastMessageTime.toDate())
          : '';
        const isOnline  = conv.onlineStatus?.[otherId] || false;
        const avatarClass = userRole === 'vendor' ? 'customer-avatar' : 'vendor-avatar';
        const photo     = conv.participantPhotos?.[otherId] || '';

        return `
          <div class="conv-row ${isUnread ? 'unread' : ''}"
            onclick="openChat('${conv.id}', '${otherId}', '${otherName.replace(/'/g,"\\'")}')">
            <div class="conv-avatar ${avatarClass}">
              ${photo ? `<img src="${photo}" onerror="this.style.display='none'">` : ''}
              <span>${initials}</span>
              ${isOnline ? '<div class="conv-online-dot"></div>' : ''}
            </div>
            <div class="conv-body">
              <div class="conv-name-row">
                <div class="conv-name">${otherName}</div>
                <div class="conv-time">${time}</div>
              </div>
              <div class="conv-preview-row">
                <div class="conv-preview ${isUnread ? 'unread-text' : ''}">
                  ${isUnread ? '' : ''}${lastMsg}
                </div>
                ${isUnread && unreadNum > 0
                  ? `<div class="conv-unread-badge">${unreadNum}</div>`
                  : ''}
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Online strip ─────────────────────────────────────────────
    function renderOnlineStrip(convs) {
      const online = convs.filter(c => {
        const otherId = c.participantIds?.find(id => id !== currentUser.uid);
        return c.onlineStatus?.[otherId];
      });

      const strip = document.getElementById('onlineStrip');
      if (!online.length) { strip.style.display = 'none'; return; }

      strip.style.display = 'block';
      document.getElementById('onlineScroll').innerHTML = online.map(conv => {
        const otherId   = conv.participantIds?.find(id => id !== currentUser.uid) || '';
        const otherName = getOtherName(conv);
        const initials  = otherName.substring(0,2).toUpperCase();
        const photo     = conv.participantPhotos?.[otherId] || '';

        return `
          <div class="online-avatar-wrap"
            onclick="openChat('${conv.id}','${otherId}','${otherName.replace(/'/g,"\\'")}')">
            <div class="online-avatar">
              ${photo ? `<img src="${photo}" onerror="this.style.display='none'">` : ''}
              <span>${initials}</span>
              <div class="online-dot"></div>
            </div>
            <div class="online-name">${otherName.split(' ')[0]}</div>
          </div>`;
      }).join('');
    }

    // ── Open chat ────────────────────────────────────────────────
    window.openChat = function(chatId, otherId, otherName) {
      localStorage.setItem('ma_active_chat', JSON.stringify({ chatId, otherId, otherName }));
      window.location.href = `shared-chat.html?chatId=${chatId}&otherId=${otherId}`;
    };

    // ── Compose new chat ─────────────────────────────────────────
    window.composeNew = function() {
      if (userRole === 'customer') {
        window.location.href = 'customer-search.html';
      } else {
        window.location.href = 'vendor-orders.html';
      }
    };

    // ── Filter conversations ─────────────────────────────────────
    window.filterConvs = function(val) {
      const q = val.trim().toLowerCase();
      if (!q) { renderConvs(allConvs); return; }
      const filtered = allConvs.filter(c =>
        getOtherName(c).toLowerCase().includes(q) ||
        (c.lastMessage||'').toLowerCase().includes(q)
      );
      renderConvs(filtered);
    };

    // ── Helpers ──────────────────────────────────────────────────
    function getOtherName(conv) {
      const otherId = conv.participantIds?.find(id => id !== currentUser.uid) || '';
      return conv.participantNames?.[otherId] || 'Unknown';
    }

    function formatTime(date) {
      const now  = new Date();
      const diff = Math.floor((now - date) / 1000);
      if (diff < 60)    return 'Just now';
      if (diff < 3600)  return `${Math.floor(diff/60)}m`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h`;
      const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
      if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return date.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    }

    function updateSubText() {
      const unread = allConvs.reduce((s,c) => s + (c.unreadCounts?.[currentUser.uid]||0), 0);
      document.getElementById('msgSubText').textContent =
        unread > 0
          ? `${unread} unread message${unread!==1?'s':''}`
          : `${allConvs.length} conversation${allConvs.length!==1?'s':''}`;
    }

    // ── Bottom nav (role-aware) ──────────────────────────────────
    function renderBottomNav() {
      const nav = document.getElementById('bottomNav');
      if (userRole === 'vendor') {
        nav.innerHTML = `
          <a href="vendor-dashboard.html" class="nav-item">
            <div class="nav-icon">🏠</div><div class="nav-label">Dashboard</div><div class="nav-dot"></div>
          </a>
          <a href="vendor-listings.html" class="nav-item">
            <div class="nav-icon">📋</div><div class="nav-label">Listings</div><div class="nav-dot"></div>
          </a>
          <a href="vendor-orders.html" class="nav-item">
            <div class="nav-icon">📦</div><div class="nav-label">Orders</div><div class="nav-dot"></div>
          </a>
          <a href="vendor-earnings.html" class="nav-item">
            <div class="nav-icon">📈</div><div class="nav-label">Earnings</div><div class="nav-dot"></div>
          </a>
          <a href="vendor-profile.html" class="nav-item">
            <div class="nav-icon">👤</div><div class="nav-label">Profile</div><div class="nav-dot"></div>
          </a>`;
      } else {
        nav.innerHTML = `
          <a href="customer-home.html" class="nav-item">
            <div class="nav-icon">🏠</div><div class="nav-label">Home</div><div class="nav-dot"></div>
          </a>
          <a href="customer-map.html" class="nav-item">
            <div class="nav-icon">🗺️</div><div class="nav-label">Map</div><div class="nav-dot"></div>
          </a>
          <a href="customer-orders.html" class="nav-item">
            <div class="nav-icon">📦</div><div class="nav-label">Orders</div><div class="nav-dot"></div>
          </a>
          <a href="shared-chat-list.html" class="nav-item active">
            <div class="nav-icon">💬</div><div class="nav-label">Messages</div><div class="nav-dot"></div>
          </a>
          <a href="customer-profile.html" class="nav-item">
            <div class="nav-icon">👤</div><div class="nav-label">Profile</div><div class="nav-dot"></div>
          </a>`;
      }
    }
  </script>

</body>
</html>
