<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bagGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9A825;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57F17;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="200" height="200" rx="40" fill="url(#logoGradient)"/>
  
  <!-- Decorative circle -->
  <circle cx="100" cy="100" r="95" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
  
  <!-- Shopping bag with market theme -->
  <g filter="url(#shadow)">
    <!-- Bag body -->
    <path d="M 60 80 L 60 140 Q 60 150 70 150 L 130 150 Q 140 150 140 140 L 140 80" 
          fill="url(#bagGradient)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Bag top -->
    <ellipse cx="100" cy="80" rx="40" ry="15" fill="url(#bagGradient)" stroke="white" stroke-width="2"/>
    
    <!-- Handle left -->
    <path d="M 75 80 Q 75 50 100 45" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Handle right -->
    <path d="M 125 80 Q 125 50 100 45" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Decorative items in bag (representing market goods) -->
    <g opacity="0.9">
      <!-- Tomato inside bag -->
      <circle cx="80" cy="110" r="6" fill="rgba(239, 83, 80, 0.8)"/>
      <!-- Carrot inside bag -->
      <rect x="95" y="105" width="3" height="12" fill="rgba(255, 152, 0, 0.8)" rx="1"/>
      <!-- Lettuce -->
      <path d="M 115 115 Q 118 110 120 115" stroke="rgba(76, 175, 80, 0.8)" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Street market indicator - small flag at bottom -->
  <g opacity="0.85">
    <rect x="70" y="160" width="60" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  </g>
</svg>