<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mukoto Avenue — Orders</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232E7D32' width='100' height='100' rx='20'/><text x='50' y='70' font-size='60' text-anchor='middle' dominant-baseline='middle'>🛍️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #FAFAFA;
      font-family: 'Inter', sans-serif;
      padding-bottom: 90px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(160deg, #2E7D32 0%, #1B5E20 100%);
      padding: 52px 20px 20px;
      position: sticky; top: 0; z-index: 100;
    }
    .header-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; border: none;
      color: white; text-decoration: none; transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.25); }
    .header-title {
      font-family: 'Poppins', sans-serif;
      font-size: 20px; font-weight: 800; color: white;
    }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 1px; }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 6px;
      overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 8px 16px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
      white-space: nowrap; cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.1);
      transition: all 0.2s; flex-shrink: 0;
      position: relative;
    }
    .tab.active {
      background: white; color: #2E7D32;
      border-color: white;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }
    .tab-badge {
      position: absolute; top: -4px; right: -4px;
      width: 16px; height: 16px;
      background: #F9A825; border-radius: 50%;
      font-size: 9px; font-weight: 700; color: white;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #1B5E20;
    }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex; background: white;
      margin: 14px 16px 0; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .strip-stat {
      flex: 1; padding: 12px 8px; text-align: center;
      border-right: 1px solid #F3F4F6;
    }
    .strip-stat:last-child { border-right: none; }
    .strip-val {
      font-family: 'Poppins', sans-serif;
      font-size: 17px; font-weight: 800; color: #1A1A1A;
    }
    .strip-label { font-size: 10px; color: #9CA3AF; margin-top: 1px; }

    /* ── Orders list ── */
    .orders-list {
      padding: 14px 16px 0;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* Order card */
    .order-card {
      background: white; border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      animation: slideIn 0.3s ease both;
      transition: all 0.2s;
    }
    @keyframes slideIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Status strip */
    .status-strip { height: 4px; }
    .strip-pending   { background: linear-gradient(90deg, #F9A825, #FFD54F); }
    .strip-confirmed { background: linear-gradient(90deg, #1565C0, #42A5F5); }
    .strip-fulfilled { background: linear-gradient(90deg, #2E7D32, #66BB6A); }
    .strip-cancelled { background: linear-gradient(90deg, #EF5350, #EF9A9A); }

    .order-card-body { padding: 14px; }

    /* Card top */
    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 12px;
    }
    .order-num {
      font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 800; color: #1A1A1A;
      margin-bottom: 2px;
    }
    .order-time { font-size: 11px; color: #9CA3AF; }
    .status-badge {
      padding: 4px 10px; border-radius: 999px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-pending   { background: #fffde7; color: #F57F17; }
    .badge-confirmed { background: #e3f2fd; color: #1565C0; }
    .badge-fulfilled { background: #e8f5e9; color: #2E7D32; }
    .badge-cancelled { background: #fef2f2; color: #EF5350; }

    /* Customer row */
    .customer-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .customer-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #F9A825, #F57F17);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: white;
      font-family: 'Poppins', sans-serif; flex-shrink: 0;
    }
    .customer-info { flex: 1; }
    .customer-name {
      font-size: 13px; font-weight: 700; color: #1A1A1A;
    }
    .customer-phone { font-size: 11px; color: #9CA3AF; margin-top: 1px; }
    .order-total {
      font-family: 'Poppins', sans-serif;
      font-size: 16px; font-weight: 800; color: #2E7D32;
    }

    /* Items preview */
    .items-preview {
      display: flex; gap: 6px; margin-bottom: 12px;
      overflow-x: auto; scrollbar-width: none;
    }
    .items-preview::-webkit-scrollbar { display: none; }
    .item-thumb {
      width: 48px; height: 48px; border-radius: 10px;
      background: #F3F4F6; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; overflow: hidden; position: relative;
    }
    .item-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .item-qty {
      position: absolute; bottom: 2px; right: 2px;
      background: rgba(0,0,0,0.65); color: white;
      font-size: 8px; font-weight: 700;
      padding: 1px 4px; border-radius: 4px;
    }

    /* Items text */
    .items-text {
      font-size: 12px; color: #6B7280;
      margin-bottom: 12px; line-height: 1.5;
    }

    /* Payment method */
    .payment-row {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 12px;
    }
    .payment-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600; color: #374151;
      background: #F3F4F6;
    }

    /* Action buttons */
    .action-row { display: flex; gap: 8px; }
    .btn-confirm {
      flex: 2; padding: 11px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #2E7D32, #1B5E20);
      color: white; font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 3px 10px rgba(46,125,50,0.3);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-confirm:hover { transform: translateY(-1px); }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-fulfill {
      flex: 2; padding: 11px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #1565C0, #0D47A1);
      color: white; font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 3px 10px rgba(21,101,192,0.3);
    }
    .btn-fulfill:hover { transform: translateY(-1px); }

    .btn-chat {
      flex: 1; padding: 11px; border-radius: 10px;
      border: 1.5px solid #E5E7EB; background: white;
      font-size: 13px; font-weight: 700; color: #374151;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .btn-chat:hover { border-color: #2E7D32; color: #2E7D32; }

    .btn-decline {
      flex: 1; padding: 11px; border-radius: 10px;
      border: 1.5px solid #fecaca; background: #fef2f2;
      font-size: 13px; font-weight: 700; color: #EF5350;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-decline:hover { background: #fee2e2; }

    /* Fulfilled card style */
    .order-card.fulfilled { opacity: 0.8; }

    /* Notes */
    .order-notes {
      background: #fffde7; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 10px;
      font-size: 12px; color: #795548;
      display: flex; gap: 6px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 60px 20px; display: none;
    }
    .empty-state.show { display: block; }
    .empty-emoji { font-size: 56px; margin-bottom: 14px; }
    .empty-title {
      font-family: 'Poppins', sans-serif;
      font-size: 18px; font-weight: 800; color: #1A1A1A; margin-bottom: 8px;
    }
    .empty-desc { font-size: 14px; color: #9CA3AF; line-height: 1.6; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite; border-radius: 16px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #F3F4F6;
      display: flex; padding: 10px 0 20px; z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      cursor: pointer; text-decoration: none; padding: 4px 0;
    }
    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; font-weight: 600; color: #9CA3AF; }
    .nav-item.active .nav-label { color: #2E7D32; }
    .nav-dot { width: 4px; height: 4px; background: #2E7D32; border-radius: 50%; display: none; }
    .nav-item.active .nav-dot { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 20px; border-radius: 12px;
      font-size: 13px; font-weight: 600; color: white;
      opacity: 0; transition: all 0.3s; z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      max-width: 90vw; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #2E7D32; }
    .toast.error   { background: #EF5350; }
    .toast.info    { background: #1565C0; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <div class="header-left">
        <a href="vendor-dashboard.html" class="back-btn">←</a>
        <div>
          <div class="header-title">Orders</div>
          <div class="header-sub" id="orderSubText">Loading...</div>
        </div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" id="tab-all"       onclick="switchTab('all',this)">All</div>
      <div class="tab"        id="tab-pending"   onclick="switchTab('pending',this)">
        Pending <div class="tab-badge" id="pendingBadge" style="display:none;">0</div>
      </div>
      <div class="tab" id="tab-confirmed" onclick="switchTab('confirmed',this)">Confirmed</div>
      <div class="tab" id="tab-fulfilled" onclick="switchTab('fulfilled',this)">Fulfilled</div>
      <div class="tab" id="tab-cancelled" onclick="switchTab('cancelled',this)">Cancelled</div>
    </div>
  </div>

  <!-- Stats strip -->
  <div class="stats-strip">
    <div class="strip-stat">
      <div class="strip-val" id="statPending">—</div>
      <div class="strip-label">Pending</div>
    </div>
    <div class="strip-stat">
      <div class="strip-val" id="statConfirmed">—</div>
      <div class="strip-label">Confirmed</div>
    </div>
    <div class="strip-stat">
      <div class="strip-val" id="statFulfilled">—</div>
      <div class="strip-label">Fulfilled</div>
    </div>
    <div class="strip-stat">
      <div class="strip-val" id="statRevenue">—</div>
      <div class="strip-label">Revenue</div>
    </div>
  </div>

  <!-- Orders list -->
  <div class="orders-list" id="ordersList">
    <div class="skeleton" style="height:220px;"></div>
    <div class="skeleton" style="height:220px;"></div>
    <div class="skeleton" style="height:220px;"></div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="empty-emoji">📦</div>
    <div class="empty-title">No orders here</div>
    <div class="empty-desc">Orders will appear here when customers purchase from your shop.</div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="vendor-dashboard.html" class="nav-item">
      <div class="nav-icon">🏠</div><div class="nav-label">Dashboard</div><div class="nav-dot"></div>
    </a>
    <a href="vendor-listings.html" class="nav-item">
      <div class="nav-icon">📋</div><div class="nav-label">Listings</div><div class="nav-dot"></div>
    </a>
    <a href="vendor-orders.html" class="nav-item active">
      <div class="nav-icon">📦</div><div class="nav-label">Orders</div><div class="nav-dot"></div>
    </a>
    <a href="vendor-earnings.html" class="nav-item">
      <div class="nav-icon">📈</div><div class="nav-label">Earnings</div><div class="nav-dot"></div>
    </a>
    <a href="vendor-profile.html" class="nav-item">
      <div class="nav-icon">👤</div><div class="nav-label">Profile</div><div class="nav-dot"></div>
    </a>
  </nav>

  <div class="toast" id="toast"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, query,
      where, orderBy, getDocs, doc, updateDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2vGB7iehqse--Th5wds1MoU4ZHr_DYY4",
      authDomain: "mukoto-avenue-3758a.firebaseapp.com",
      projectId: "mukoto-avenue-3758a",
      storageBucket: "mukoto-avenue-3758a.firebasestorage.app",
      messagingSenderId: "172793539743",
      appId: "1:172793539743:web:46fae0bd5be1ecedebc6aa",
      measurementId: "G-VN9T6FEVJ0"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    let allOrders   = [];
    let activeTab   = 'all';

    // ── Auth guard ───────────────────────────────────────────────
    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;
      await loadOrders();
    });

    // ── Load orders ──────────────────────────────────────────────
    async function loadOrders() {
      try {
        const q = query(
          collection(db, 'orders'),
          where('vendorId', '==', currentUser.uid),
          orderBy('createdAt', 'desc')
        );
        const snap = await getDocs(q);
        allOrders  = [];
        snap.forEach(d => allOrders.push({ id: d.id, ...d.data() }));
      } catch {
        try {
          const q2    = query(collection(db, 'orders'), where('vendorId','==',currentUser.uid));
          const snap2 = await getDocs(q2);
          allOrders   = [];
          snap2.forEach(d => allOrders.push({ id: d.id, ...d.data() }));
          allOrders.sort((a,b) => {
            const ta = a.createdAt?.toDate?.() || new Date(0);
            const tb = b.createdAt?.toDate?.() || new Date(0);
            return tb - ta;
          });
        } catch(e) { console.error(e); }
      }
      renderStats();
      renderOrders();
    }

    // ── Render stats ─────────────────────────────────────────────
    function renderStats() {
      const pending   = allOrders.filter(o => o.orderStatus === 'pending').length;
      const confirmed = allOrders.filter(o => o.orderStatus === 'confirmed').length;
      const fulfilled = allOrders.filter(o => o.orderStatus === 'fulfilled').length;
      const revenue   = allOrders
        .filter(o => o.orderStatus === 'fulfilled')
        .reduce((s,o) => s + Number(o.totalAmount||0), 0);

      document.getElementById('statPending').textContent   = pending;
      document.getElementById('statConfirmed').textContent = confirmed;
      document.getElementById('statFulfilled').textContent = fulfilled;
      document.getElementById('statRevenue').textContent   = `$${revenue.toFixed(0)}`;
      document.getElementById('orderSubText').textContent  =
        `${allOrders.length} total · ${pending} need action`;

      // Pending badge
      const badge = document.getElementById('pendingBadge');
      if (pending > 0) { badge.style.display = 'flex'; badge.textContent = pending; }
      else badge.style.display = 'none';
    }

    // ── Render orders ────────────────────────────────────────────
    function renderOrders() {
      const filtered = activeTab === 'all'
        ? allOrders
        : allOrders.filter(o => o.orderStatus === activeTab);

      const list  = document.getElementById('ordersList');
      const empty = document.getElementById('emptyState');

      if (!filtered.length) {
        list.innerHTML = '';
        empty.classList.add('show');
        return;
      }
      empty.classList.remove('show');

      list.innerHTML = filtered.map((order, i) => {
        const status    = order.orderStatus || 'pending';
        const badgeClass = `badge-${status}`;
        const stripClass = `strip-${status}`;
        const badgeLabel = { pending:'Pending', confirmed:'Confirmed', fulfilled:'Fulfilled', cancelled:'Cancelled' }[status] || status;
        const items     = order.items || [];
        const total     = Number(order.totalAmount||0).toFixed(2);
        const time      = order.createdAt?.toDate ? timeAgo(order.createdAt.toDate()) : 'Recently';
        const orderNum  = `MKT-${order.id.substring(0,6).toUpperCase()}`;
        const initials  = (order.customerName||'C').substring(0,2).toUpperCase();
        const payment   = paymentLabel(order.paymentMethod);

        const thumbs = items.slice(0,4).map(item => `
          <div class="item-thumb">
            ${item.image ? `<img src="${item.image}" onerror="this.style.display='none'">` : ''}
            <span>${catEmoji(item.category)}</span>
            ${(item.qty||1) > 1 ? `<div class="item-qty">×${item.qty}</div>` : ''}
          </div>`).join('');

        const itemsSummary = items.map(i =>
          `${i.title}${(i.qty||1)>1?' ×'+i.qty:''}`
        ).join(' · ');

        const notes = order.notes
          ? `<div class="order-notes">📝 ${order.notes}</div>` : '';

        // Action buttons based on status
        let actions = '';
        if (status === 'pending') {
          actions = `
            <button class="btn-confirm" onclick="updateStatus('${order.id}','confirmed')">
              ✅ Confirm Order
            </button>
            <button class="btn-chat" onclick="goToChat('${order.customerId}','${order.customerName||''}')">
              💬
            </button>
            <button class="btn-decline" onclick="updateStatus('${order.id}','cancelled')">
              ✕
            </button>`;
        } else if (status === 'confirmed') {
          actions = `
            <button class="btn-fulfill" onclick="updateStatus('${order.id}','fulfilled')">
              📦 Mark as Fulfilled
            </button>
            <button class="btn-chat" onclick="goToChat('${order.customerId}','${order.customerName||''}')">
              💬 Chat
            </button>`;
        } else if (status === 'fulfilled') {
          actions = `
            <button class="btn-chat" onclick="goToChat('${order.customerId}','${order.customerName||''}')"
              style="flex:1;">
              💬 Message Customer
            </button>`;
        }

        return `
          <div class="order-card ${status}" style="animation-delay:${i*0.06}s">
            <div class="status-strip ${stripClass}"></div>
            <div class="order-card-body">
              <div class="card-top">
                <div>
                  <div class="order-num">#${orderNum}</div>
                  <div class="order-time">${time}</div>
                </div>
                <div class="status-badge ${badgeClass}">${badgeLabel}</div>
              </div>
              <div class="customer-row">
                <div class="customer-avatar">${initials}</div>
                <div class="customer-info">
                  <div class="customer-name">${order.customerName||'Customer'}</div>
                  <div class="customer-phone">${order.phone||'No phone'}</div>
                </div>
                <div class="order-total">$${total}</div>
              </div>
              <div class="items-preview">${thumbs}</div>
              <div class="items-text">${itemsSummary.substring(0,80)}${itemsSummary.length>80?'...':''}</div>
              ${notes}
              <div class="payment-row">
                <div class="payment-badge">${payment}</div>
              </div>
              <div class="action-row">${actions}</div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Update order status ──────────────────────────────────────
    window.updateStatus = async function(orderId, newStatus) {
      const messages = {
        confirmed: 'Order confirmed ✅',
        fulfilled: 'Order marked as fulfilled 📦',
        cancelled: 'Order declined'
      };
      try {
        await updateDoc(doc(db, 'orders', orderId), {
          orderStatus: newStatus,
          updatedAt: serverTimestamp()
        });
        const idx = allOrders.findIndex(o => o.id === orderId);
        if (idx !== -1) allOrders[idx].orderStatus = newStatus;
        renderStats();
        renderOrders();
        showToast(messages[newStatus] || 'Updated', newStatus === 'cancelled' ? 'error' : 'success');
      } catch (err) {
        console.error('Status update error:', err);
        showToast('Could not update order. Try again.', 'error');
      }
    };

    // ── Go to chat ───────────────────────────────────────────────
    window.goToChat = function(customerId, customerName) {
      localStorage.setItem('ma_chat_customer', JSON.stringify({ id: customerId, name: customerName }));
      window.location.href = `shared-chat.html?customerId=${customerId}`;
    };

    // ── Tab switch ───────────────────────────────────────────────
    window.switchTab = function(tab, el) {
      activeTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderOrders();
    };

    // ── Helpers ──────────────────────────────────────────────────
    function timeAgo(date) {
      const diff = Math.floor((Date.now() - date) / 1000);
      if (diff < 60)    return 'Just now';
      if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    function paymentLabel(method) {
      const m = { ecocash:'💚 EcoCash', onemoney:'💙 OneMoney', telecash:'🧡 Telecash', cash:'💵 Cash' };
      return m[method] || `💳 ${method||'Unknown'}`;
    }

    function catEmoji(cat) {
      const m = { Clothing:'👕', Shoes:'👟', Accessories:'👜', Bags:'🎒', Vintage:'🕶️', Wholesale:'📦', Kids:'🧒' };
      return m[cat] || '🛍️';
    }

    window.showToast = function(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 2500);
    };
  </script>

</body>
</html>
